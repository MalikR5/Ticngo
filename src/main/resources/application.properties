spring.application.name=ticngo-javafx
spring.main.web-application-type=none

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ticngo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialisation données demo
app.init-data=true

# Logging
logging.level.fr.ticngo=INFO
logging.level.org.springframework=WARN
